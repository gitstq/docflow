[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "docflow"
version = "1.0.0"
description = "High-performance document conversion and intelligent processing engine"
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "DocFlow Team", email = "docflow@example.com"}
]
maintainers = [
    {name = "DocFlow Team", email = "docflow@example.com"}
]
keywords = [
    "document-converter",
    "markdown",
    "pdf",
    "word",
    "powerpoint",
    "excel",
    "ocr",
    "cli",
    "batch-processing"
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Intended Audience :: End Users/Desktop",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Office/Business :: Office Suites",
    "Topic :: Text Processing :: Markup :: Markdown",
    "Topic :: Utilities",
    "Typing :: Typed"
]
requires-python = ">=3.9"
dependencies = [
    "click>=8.1.0",
    "rich>=13.0.0",
    "pydantic>=2.0.0",
    "PyYAML>=6.0",
    "pdfplumber>=0.10.0",
    "PyMuPDF>=1.23.0",
    "python-docx>=1.0.0",
    "python-pptx>=0.6.21",
    "openpyxl>=3.1.0",
    "beautifulsoup4>=4.12.0",
    "html2text>=2020.1.16",
    "Pillow>=10.0.0",
    "pytesseract>=0.3.10",
    "chardet>=5.0.0",
    "tenacity>=8.2.0",
    "tqdm>=4.65.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "pytest-xdist>=3.0.0",
    "black>=23.0.0",
    "isort>=5.12.0",
    "mypy>=1.0.0",
    "ruff>=0.1.0",
]
ai = [
    "openai>=1.0.0",
    "anthropic>=0.18.0",
]
all = [
    "docflow[dev,ai]",
]

[project.scripts]
docflow = "docflow.cli.main:main"

[project.urls]
Homepage = "https://github.com/yourusername/docflow"
Documentation = "https://github.com/yourusername/docflow#readme"
Repository = "https://github.com/yourusername/docflow.git"
Issues = "https://github.com/yourusername/docflow/issues"
Changelog = "https://github.com/yourusername/docflow/blob/main/CHANGELOG.md"

[tool.setuptools.packages.find]
where = ["."]
include = ["docflow*"]

[tool.setuptools.package-data]
docflow = ["py.typed", "config/*.yaml"]

[tool.black]
line-length = 100
target-version = ["py39", "py310", "py311", "py312"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 100
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true

[tool.ruff]
line-length = 100
target-version = "py39"
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "ARG", # flake8-unused-arguments
    "SIM", # flake8-simplify
]
ignore = [
    "E501",  # line too long (handled by black)
    "B008",  # do not perform function calls in argument defaults
]

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra -q --cov=docflow --cov-report=term-missing --cov-report=html"
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_functions = ["test_*"]
